    kind: file
  legacy_reference_labels_2024:
    path: ${FCPLM_DATA_ROOT}/dbcan4-advanced/data/reference_labels_2024.tsv
    kind: file
  legacy_test_labels_2025:
    path: ${FCPLM_DATA_ROOT}/dbcan4-advanced/data/test_2025_labels.tsv
    kind: file
  legacy_embeddings:
    path: ${FCPLM_DATA_ROOT}/dbcan4-advanced/emb
    kind: directory
    include: "*.npz"
